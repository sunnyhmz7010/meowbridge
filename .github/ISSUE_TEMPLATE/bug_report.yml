name: Bug Report / 缺陷反馈
description: Report a reproducible bug in meowbridge / 提交可复现的问题
title: "[Bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug.
        感谢你反馈问题。

  - type: textarea
    id: summary
    attributes:
      label: Bug Summary / 问题概述
      description: Describe the issue clearly and concisely. / 请简要描述问题。
      placeholder: What went wrong? / 出现了什么问题？
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce / 复现步骤
      description: If possible, list the shortest steps to reproduce it. / 如方便，请提供最小复现步骤。
      placeholder: |
        1. Start meowbridge with ...
        2. Send webhook request to ...
        3. See error ...
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version / 版本
      description: meowbridge version, tag, or commit hash. / meowbridge 版本、标签或 commit hash。
      placeholder: e.g. v0.1.0 or acbea8b
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment / 运行环境
      description: OS, Go version, deployment method, database, browser if related to admin UI. / 操作系统、Go 版本、部署方式、数据库；若与管理后台相关，请填写浏览器。
      placeholder: |
        OS: Ubuntu 22.04 / Windows 11
        Go: 1.23.x
        Deployment: go run / binary / Docker / reverse proxy
        Browser: Chrome / Edge / Firefox
    validations:
      required: true

  - type: textarea
    id: config
    attributes:
      label: Configuration / 配置信息
      description: Relevant environment variables or endpoint settings. Remove secrets before submitting. / 相关环境变量或 endpoint 设置。提交前请移除密钥。
      placeholder: |
        MEOW_API_BASE_URL=...
        DATABASE_PATH=...
        Webhook source: GitHub / Grafana / Generic / ...

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior / 期望行为
      description: What should have happened? / 你期望的结果是什么？
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior / 实际行为
      description: What actually happened? / 实际发生了什么？
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs, Payload, or Screenshots / 日志、Payload 或截图
      description: Paste relevant logs, sanitized webhook payload, MeoW response, or screenshots. / 贴出相关日志、脱敏后的 Webhook payload、MeoW 响应或截图。

  - type: checkboxes
    id: checks
    attributes:
      label: Checklist / 提交前确认
      options:
        - label: I have searched existing issues before submitting this report. / 我已先搜索过现有 Issue。
        - label: I have removed tokens, passwords, JWT secrets, and other sensitive information. / 我已移除 token、密码、JWT Secret 等敏感信息。
        - label: I have included enough information to reproduce the issue. / 我已提供足够复现问题的信息。

name: Feature Request / 功能建议
description: Suggest a new feature or improvement / 提交新功能或改进建议
title: "[Feature] "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Thanks for sharing your idea.
        感谢你提出建议。

  - type: textarea
    id: use-case
    attributes:
      label: Use Case / 使用场景
      description: What are you trying to do, and where is the current pain point? / 你想做什么，当前卡点在哪里？
      placeholder: Describe the service, webhook source, deployment mode, or admin workflow you want to improve. / 简要描述要改进的服务来源、部署方式或管理后台流程。
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Expected Improvement / 期望改进
      description: What would you like meowbridge to do? / 你希望 meowbridge 怎么做？
      placeholder: Describe the feature or behavior you want. / 描述你希望新增的功能或行为。
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area / 影响范围
      description: Which part of meowbridge does this request affect? / 这个建议主要影响哪部分？
      options:
        - Webhook parser / Webhook 解析器
        - MeoW delivery / MeoW 推送
        - Admin API / 管理 API
        - Admin UI / 管理后台
        - Deployment / 部署
        - Documentation / 文档
        - Other / 其他
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered / 备选方案
      description: Any other approaches you have thought about? / 你考虑过的其他方案？

  - type: textarea
    id: compatibility
    attributes:
      label: Compatibility Notes / 兼容性说明
      description: Would this change affect existing webhook URLs, tokens, configs, database, or API behavior? / 是否会影响现有 Webhook URL、token、配置、数据库或 API 行为？

  - type: checkboxes
    id: checks
    attributes:
      label: Checklist / 提交前确认
      options:
        - label: I have searched existing issues before submitting this request. / 我已先搜索过现有 Issue。
        - label: I have explained the concrete use case rather than only naming a solution. / 我已说明具体使用场景，而不只是给出方案名。

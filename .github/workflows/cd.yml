name: CD

permissions:
  contents: write

on:
  release:
    types:
      - published

jobs:
  cd:
    name: Linux (${{ matrix.arch }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
          - arch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.x'
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install frontend dependencies
        working-directory: web
        run: npm ci

      - name: Build frontend
        working-directory: web
        run: npm run build

      - name: Copy frontend assets for Go embed
        run: |
          rm -rf internal/webui/dist
          mkdir -p internal/webui/dist
          cp -R web/dist/. internal/webui/dist/

      - name: Build binary
        run: |
          GOOS=linux GOARCH="${{ matrix.arch }}" CGO_ENABLED=0 \
            go build -trimpath -ldflags="-s -w" \
            -o meowbridge ./cmd/meowbridge

      - name: Package release
        run: tar -czf "meowbridge-linux-${{ matrix.arch }}.tar.gz" meowbridge

      - name: Upload to release
        run: gh release upload "${{ github.event.release.tag_name }}" "meowbridge-linux-${{ matrix.arch }}.tar.gz" --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
